name: CF Speedtest Final
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Speedtest
        run: |
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -zxvf CloudflareST_linux_amd64.tar.gz
          
          # 核心修改：强制让工具直接读取你的 hk_ips.txt，拒绝任何硬编码
          # -f 参数指向你的真实 IP 文件，不再手动 echo
          ./CloudflareST -f hk_ips.txt -n 10 -tl 500 -o result.txt
          
          cat result.txt
          
      - name: Push Result
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add result.txt
          git commit -m "Update correct Speedtest Result" || exit 0
          git push
